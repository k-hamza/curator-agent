# =============================================================================
# Tech Watch Agent — Configuration
# =============================================================================
# Edit this file to customise the agent behaviour.
# Adding a new source: add an entry to the sources list with the correct type.
# Valid types: rss | api | pdf | web

agent:
  model: "qwen3:8b"                           # Ollama model to use
  llm_base_url: "http://localhost:11434/v1"  # Ollama local — replace with any OpenAI-compatible URL
  max_articles_per_run: 50                     # max articles processed per run
  relevance_threshold: 0.6                     # min LLM score to include an article (0.0–1.0)
  pdf_timeout: 30                              # seconds — increase on slow connections
  pdf_max_chars: 8000                          # characters extracted per PDF (reduce for small context models)
  pdf_max_concurrent: 3                        # PDFs downloaded in parallel
  pdf_storage_dir: "data/pdfs"                 # base dir for downloaded PDFs — subdirs created per source

interests:
  - "AI agents"
  - "LLM"
  - "DevOps"
  - "MLOps"
  - "infrastructure"
  - "agentic engineering"
  - "ai engineering"
  - "generative ai"
  - "Platform Engineering"
  - "SRE"

scheduling:
  enabled: false          # set to true to enable daily automatic runs
  cron: "0 7 * * *"       # daily at 07:00 — min hour day month weekday

# -----------------------------------------------------------------------------
# Sources
# Each entry requires: name, type, url, enabled
# Optional fields: max_items, categories
# -----------------------------------------------------------------------------
sources:
  - name: "Hugging Face Blog"
    type: rss
    url: "https://huggingface.co/blog/feed.xml"
    enabled: true

  - name: "LangChain Blog"
    type: rss
    url: "https://www.langchain.com/blog/rss.xml"
    enabled: true
    max_items: 10

  - name: "arXiv"
    type: pdf
    url: "https://arxiv.org"
    enabled: true
    # https://arxiv.org/category_taxonomy
    categories: ["cs.AI", "cs.LG", "cs.MA", "cs.CL", "cs.CV", "cs.SE"]
    max_items: 10

  - name: "HackerNews"
    type: api
    url: "https://hacker-news.firebaseio.com"
    enabled: true
    max_items: 20
  
  - name: "Towards Data Science"
    type: rss
    url: "https://towardsdatascience.com/feed"
    enabled: true

  - name: "Simon Willison"
    type: rss
    url: "https://simonwillison.net/atom/everything/"
    enabled: true

  - name: "Lilian Weng"
    type: rss
    url: "https://lilianweng.github.io/index.xml"
    enabled: true
    max_items: 10

  - name: "Google DeepMind"
    type: rss
    url: "https://deepmind.google/blog/rss.xml"
    enabled: true
    max_items: 10

  - name: "Chip Huyen"
    type: rss
    url: "https://huyenchip.com/feed.xml"
    enabled: true

  - name: "The New Stack"
    type: rss
    url: "https://thenewstack.io/feed/"
    enabled: true
    max_items: 10

